name: Push Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.author.name != 'zaparoo-ci-bot' }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache ARM toolchain
        uses: actions/cache@v4
        with:
          path: gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf
          key: gcc-arm-10.2-2020.11

      - name: Build and release
        run: bash .github/build_release.sh
        env:
          GH_TOKEN: ${{ github.token }}
